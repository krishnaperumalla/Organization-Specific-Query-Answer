<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/login_style.css">
</head>
<body>
    <div class="left-section">
        <div class="animation-container">
            <div class="floating-docs">
                <div class="doc-icon"></div>
                <div class="doc-icon"></div>
                <div class="doc-icon"></div>
                <div class="doc-icon"></div>
                <div class="doc-icon"></div>
            </div>

            <div class="data-stream"></div>
            <div class="data-stream"></div>
            <div class="data-stream"></div>
            <div class="data-stream"></div>

            <div class="orbit-container">
                <div class="orbit">
                    <div class="particle"></div>
                </div>
                <div class="orbit">
                    <div class="particle"></div>
                </div>
                <div class="orbit">
                    <div class="particle"></div>
                </div>
            </div>

            <div class="ai-core">
                <div class="neural-network">
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                    <div class="node"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="right-section">
        <div class="login-container">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                </div>
                <h1>DOCUMIND</h1>
                <p class="subtitle">AI-Powered Document Intelligence</p>
            </div>
            
            <h2 id="formTitle">Welcome Back</h2>
            
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <button type="submit" id="submitBtn">Sign In</button>
            </form>
            
            <div class="toggle-form">
                <span>Don't have an account? <a id="toggleLink">Create Account</a></span>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="document-loader">
                <div class="doc-page"></div>
                <div class="doc-page"></div>
                <div class="doc-page"></div>
            </div>
            <div class="ai-brain">
                <div class="brain-core"></div>
                <div class="brain-wave"></div>
                <div class="brain-wave"></div>
                <div class="brain-wave"></div>
            </div>
        </div>
        <p class="loading-text">Logging In</p>
        <p class="loading-subtext">Securing your session...</p>
    </div>

    
    <script src="/static/script_login.js"></script>
    
</body>
</html>
